name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/steeve
            REPO="https://raw.githubusercontent.com/renehagege-svg/signofthetimes/master"
            curl -sL "$REPO/index.html" -o index.html
            curl -sL "$REPO/collection.html" -o collection.html
            curl -sL "$REPO/watches.json" -o watches.json
            curl -sL "$REPO/admin/index.html" -o admin/index.html
            curl -sL "$REPO/gone-too-soon.html" -o gone-too-soon.html 2>/dev/null || true
            curl -sL "$REPO/upgrade-trade.html" -o upgrade-trade.html 2>/dev/null || true
            echo Deploy OK
