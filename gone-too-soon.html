<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gone Too Soon — Sign Of Times</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--dark:#111;--darker:#161616;--peach:#E8C4A0;--peach-light:#F5DEC8;--white:#F9F5F0;--gray:#888880;--border:rgba(232,196,160,0.2);--gold:#F6961B;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;}
  nav{position:fixed;top:0;width:100%;z-index:100;padding:6px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.97);backdrop-filter:blur(8px);border-bottom:1px solid rgba(246,150,27,0.3);}
  .nav-logo img{height:90px;width:auto;filter:brightness(0) saturate(100%) invert(57%) sepia(100%) saturate(900%) hue-rotate(-2deg) brightness(103%);}
  .nav-right{display:flex;align-items:center;gap:20px;}
  .nav-back{color:#F6961B;text-decoration:none;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:500;opacity:.9;transition:opacity .2s;}
  .nav-back:hover{opacity:1;}
  .page-hero{padding:140px 60px 60px;background:var(--darker);border-bottom:1px solid var(--border);}
  .page-hero .eyebrow{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--peach);margin-bottom:14px;}
  .page-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,6vw,72px);font-weight:300;line-height:1.1;}
  .page-hero h1 em{font-style:italic;color:var(--peach-light);}
  .page-hero p{margin-top:18px;font-size:13px;color:rgba(249,245,240,.6);max-width:480px;line-height:1.9;}
  .photo-wall{padding:60px;max-width:1400px;margin:0 auto;}
  .wall-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
  .sold-card{position:relative;overflow:hidden;cursor:default;}
  .sold-card img{width:100%;aspect-ratio:3/4;object-fit:cover;filter:grayscale(30%) brightness(.8);transition:filter .4s;}
  .sold-card:hover img{filter:grayscale(0%) brightness(.9);}
  .sold-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;background:linear-gradient(to top,rgba(10,10,10,.85) 0%,transparent 60%);}
  .sold-badge{position:absolute;top:14px;right:14px;background:rgba(232,196,160,0.2);border:1px solid var(--peach);color:var(--peach);font-size:9px;letter-spacing:.2em;padding:5px 12px;text-transform:uppercase;}
  .sold-brand{font-size:9px;letter-spacing:.2em;color:var(--peach);text-transform:uppercase;margin-bottom:5px;}
  .sold-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;}
  .empty-note{text-align:center;padding:80px 24px;color:var(--gray);font-size:13px;line-height:2;}
  .empty-note em{color:var(--peach-light);font-style:italic;}
  @media(max-width:900px){nav{padding:12px 20px;}.nav-logo img{height:90px;}.photo-wall{padding:28px 16px;}.wall-grid{grid-template-columns:repeat(2,1fr);gap:2px;}.page-hero{padding:110px 20px 40px;}}
  @media(max-width:600px){nav{padding:10px 16px;}.nav-logo img{height:72px;}.page-hero{padding:90px 16px 32px;}.wall-grid{grid-template-columns:repeat(2,1fr);}.page-hero h1{font-size:clamp(32px,10vw,52px);}}
  @media(max-width:400px){.wall-grid{grid-template-columns:1fr;}}
  @media(max-width:500px){.wall-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Sign Of Times"></a>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← Back to Collection</a>
  </div>
</nav>

<div class="page-hero">
  <p class="eyebrow">Archive</p>
  <h1>Gone <em>Too Soon</em></h1>
  <p>A curated wall of exceptional timepieces that have already found their new home. Let them inspire what's next.</p>
</div>

<div class="photo-wall">
  <div class="wall-grid" id="soldGrid"></div>
</div>

<footer style="padding:32px 60px;background:var(--darker);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);">
  <img src="images/logo.png" alt="Sign Of Times" style="height:36px;opacity:.7;">
  <p style="font-size:11px;color:var(--gray);">© 2026 Sign Of Times</p>
</footer>

<script>
// Sold watches — add real data when available
const soldWatches = [
  {img:'watch13.jpg',brand:'Patek Philippe',name:'Vintage Dress Watch'},
  {img:'watch15.jpg',brand:'Audemars Piguet',name:'Gold Skeleton'},
  {img:'watch12.jpg',brand:'Estate Collection',name:'Classic Piece'},
];

const grid = document.getElementById('soldGrid');
if(soldWatches.length === 0){
  grid.innerHTML = `<div class="empty-note" style="grid-column:1/-1"><em>Coming soon</em><br>As pieces find their new homes, they'll be remembered here.</div>`;
} else {
  grid.innerHTML = soldWatches.map(w=>`
    <div class="sold-card">
      <img src="images/${w.img}" alt="${w.name}">
      <span class="sold-badge">Sold</span>
      <div class="sold-overlay">
        <p class="sold-brand">${w.brand}</p>
        <h3 class="sold-name">${w.name}</h3>
      </div>
    </div>
  `).join('');
}
</script>
<footer style="flex-direction:column;align-items:center;gap:16px;">
  <div class="footer-logo" style="text-align:center;">
    <img src="images/logo.png" alt="Sign Of Times">
    <p style="color:rgba(249,245,240,0.35);font-size:10px;letter-spacing:.15em;margin-top:10px;">© 2026 Sign Of The Times. All rights reserved.</p>
  </div>
  <div style="display:flex;gap:20px;align-items:center;">
    <a href="https://www.instagram.com/signofthetimes.watch/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" style="color:#F6961B;opacity:.85;transition:opacity .2s;display:flex;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="12" cy="12" r="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="#F6961B"/></svg>
    </a>
    <a href="https://www.facebook.com/signofthetimeswatch" target="_blank" rel="noopener noreferrer" aria-label="Facebook" style="color:#F6961B;opacity:.85;transition:opacity .2s;display:flex;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#F6961B" stroke-width="1.5"/><path d="M13 21V13h2.5l.5-3H13V8.5c0-.83.42-1.5 1.5-1.5H16V4.5S15 4 13.5 4C11.5 4 10 5.5 10 8v2H7.5v3H10v8" stroke="#F6961B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</footer>
</body>
</html>
