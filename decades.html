<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Decades — Sign Of The Times</title>
<link rel="icon" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--peach:#E8C4A0;--peach-light:#D4A96A;--white:#F9F5F0;--orange:#F6961B;--bg:#161616;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--white);font-family:'Jost',sans-serif;min-height:100vh;}

  /* NAV */
  nav{position:fixed;top:0;width:100%;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.97);backdrop-filter:blur(8px);border-bottom:1px solid rgba(246,150,27,0.3);}
  .nav-logo img{height:104px;width:auto;filter:brightness(0) saturate(100%) invert(57%) sepia(100%) saturate(900%) hue-rotate(-2deg) brightness(103%);}
  .nav-center{display:flex;gap:36px;list-style:none;}
  .nav-center a{color:#F6961B;text-decoration:none;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;opacity:.9;transition:opacity .2s,color .2s;white-space:nowrap;}
  .nav-center a:hover{opacity:1;color:#fff;}
  .nav-right{display:flex;align-items:center;gap:20px;}

  /* PAGE HERO */
  .page-hero{padding:180px 60px 80px;text-align:center;background:linear-gradient(to bottom,rgba(22,22,22,0) 0%,var(--bg) 100%),url('images/watch02.jpg') center/cover no-repeat;background-attachment:fixed;}
  .page-eyebrow{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#F6961B;margin-bottom:20px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,7vw,96px);font-weight:300;line-height:1;letter-spacing:.05em;color:var(--white);}
  .page-sub{font-size:14px;color:rgba(249,245,240,0.5);margin-top:20px;letter-spacing:.1em;}

  /* DECADE SECTION */
  .decade-section{padding:80px 60px;}
  .decade-section+.decade-section{border-top:1px solid rgba(232,196,160,0.1);}
  .decade-header{margin-bottom:48px;}
  .decade-year{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#F6961B;margin-bottom:12px;}
  .decade-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,64px);font-weight:300;line-height:1.1;}
  .decade-title em{color:var(--peach-light);font-style:italic;}
  .decade-desc{font-size:13px;color:rgba(249,245,240,0.5);margin-top:14px;max-width:480px;line-height:1.8;letter-spacing:.04em;}
  .decade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .decade-empty{font-size:13px;color:rgba(249,245,240,0.3);font-style:italic;padding:40px 0;}
  .decade-section{scroll-margin-top:140px;}

  /* WATCH CARD */
  .watch-card{overflow:hidden;cursor:pointer;background:transparent;display:flex;flex-direction:column;}
  .watch-card img{width:100%;aspect-ratio:3/4;object-fit:cover;transition:transform .6s ease;display:block;}
  .watch-card:hover img{transform:scale(1.05);}
  .watch-info{padding:14px 4px 20px;display:flex;flex-direction:column;flex:1;}
  .watch-brand{font-size:9px;letter-spacing:.2em;color:#F6961B;text-transform:uppercase;margin-bottom:4px;}
  .watch-year-tag{font-size:10px;font-style:italic;color:var(--peach-light);margin-bottom:4px;}
  .watch-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;margin-bottom:6px;line-height:1.3;color:#FFFFFF;}
  .watch-price{display:inline-block;font-size:12px;color:#F6961B;margin-top:auto;margin-bottom:12px;letter-spacing:.08em;border:1px solid #F6961B;padding:5px 14px;transition:all .2s;cursor:pointer;text-decoration:none;align-self:flex-start;}
  .watch-price:hover{background:rgba(246,150,27,.65);color:#fff;}

  /* FOOTER */
  footer{padding:32px 60px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(232,196,160,0.15);font-size:11px;letter-spacing:.1em;color:rgba(249,245,240,0.4);}

  @media(max-width:900px){
    nav{padding:6px 20px;}.nav-logo img{height:67px;}
    .nav-center{display:none;}
    .page-hero{padding:140px 20px 60px;}
    .decade-section{padding:60px 20px;}
    .decade-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
    footer{padding:24px 20px;flex-direction:column;gap:8px;text-align:center;}
  }
  @media(max-width:600px){
    .decade-grid{grid-template-columns:1fr;gap:12px;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Sign Of The Times"></a>
  <ul class="nav-center">
    <li><a href="index.html#timepieces">New Timepieces</a></li>
    <li><a href="collection.html">The Collection</a></li>
    <li><a href="index.html#about">What We Are</a></li>
    <li><a href="index.html#promo">Services</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <a href="https://www.instagram.com/signofthetimes.watch/" target="_blank" rel="noopener noreferrer" style="color:#F6961B;opacity:.85;transition:opacity .2s;display:flex;align-items:center;" aria-label="Instagram">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="12" cy="12" r="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="#F6961B"/></svg>
    </a>
  </div>
</nav>

<!-- HERO -->
<div class="page-hero">
  <p class="page-eyebrow">By Decade</p>
  <h1 class="page-title">A <em>Timeline</em><br>of Desire</h1>
  <p class="page-sub">Each era defined its own obsession with time.</p>
</div>

<!-- DECADES -->
<div id="decadesContainer"></div>

<footer style="flex-direction:column;align-items:center;gap:16px;">
  <div class="footer-logo" style="text-align:center;">
    <img src="images/logo.png" alt="Sign Of Times">
    <p style="color:rgba(249,245,240,0.35);font-size:10px;letter-spacing:.15em;margin-top:10px;">© 2026 Sign Of The Times. All rights reserved.</p>
  </div>
  <div style="display:flex;gap:20px;align-items:center;">
    <a href="https://www.instagram.com/signofthetimes.watch/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" style="color:#F6961B;opacity:.85;transition:opacity .2s;display:flex;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="12" cy="12" r="5" stroke="#F6961B" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="#F6961B"/></svg>
    </a>
    <a href="https://www.facebook.com/signofthetimeswatch" target="_blank" rel="noopener noreferrer" aria-label="Facebook" style="color:#F6961B;opacity:.85;transition:opacity .2s;display:flex;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#F6961B" stroke-width="1.5"/><path d="M13 21V13h2.5l.5-3H13V8.5c0-.83.42-1.5 1.5-1.5H16V4.5S15 4 13.5 4C11.5 4 10 5.5 10 8v2H7.5v3H10v8" stroke="#F6961B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</footer>

<script>
const DECADES = [
  {
    id: "50s",
    range: [1950, 1959],
    label: "1950s",
    title: "The Birth of <em>Cool</em>",
    desc: "An era of precision and restraint. Post-war craftsmanship at its finest — understated elegance that defined what a watch should be."
  },
  {
    id: "60s",
    range: [1960, 1969],
    label: "1960s",
    title: "Like a <em>Rolling Stone</em>",
    desc: "The decade that broke every rule. Bold, free, and unapologetically expressive. Watches that moved with a generation in motion."
  },
  {
    id: "70s",
    range: [1970, 1979],
    label: "1970s",
    title: "We Can Be <em>Heroes</em>",
    desc: "Slimmer, cooler, utterly self-assured. The 70s brought a new sensibility to horology — effortless elegance in a world reinventing itself."
  },
  {
    id: "80s",
    range: [1980, 1989],
    label: "1980s",
    title: "Le <em>Freak</em>",
    desc: "Bold shapes, technical ambition, excess as an art form. Watches that dared to be different — and changed everything."
  },
  {
    id: "90s",
    range: [1990, 1999],
    label: "1990s",
    title: "<em>C<span style='color:#fff'>.</span>R<span style='color:#fff'>.</span>E<span style='color:#fff'>.</span>A<span style='color:#fff'>.</span>M<span style='color:#fff'>.</span></em>",
    desc: "The decade of cool detachment and raw elegance. Watches stripped to their essence — minimal, precise, iconic."
  }
];

fetch('/api/watches')
  .then(function(r){return r.json();})
  .then(function(watches){
    var container = document.getElementById('decadesContainer');
    var html = '';

    DECADES.forEach(function(d){
      var decadeWatches = watches.filter(function(w){
        var m = w.year ? w.year.match(/([0-9]{4})/) : null;
        var y = m ? parseInt(m[1]) : 0;
        return y >= d.range[0] && y <= d.range[1] && !w.sold;
      });

      html += '<section class="decade-section" id="'+d.id+'">';
      html += '<div class="decade-header">';
      html += '<p class="decade-year">'+d.label+'</p>';
      html += '<h2 class="decade-title">'+d.title+'</h2>';
      html += '<p class="decade-desc">'+d.desc+'</p>';
      html += '</div>';

      if(decadeWatches.length === 0){
        html += '<p class="decade-empty">No timepieces from this era currently available — check back soon.</p>';
      } else {
        html += '<div class="decade-grid">';
        decadeWatches.forEach(function(w){
          html += '<div class="watch-card" onclick="location.href=\'watch.html?id='+w.id+'\'">'
            +'<img src="images/'+w.img+'" alt="'+w.brand+' '+w.name+'" loading="lazy">'
            +'<div class="watch-info">'
            +'<p class="watch-brand">'+w.brand+'</p>'
            +(w.year ? '<p class="watch-year-tag">c.'+w.year+'</p>' : '')
            +'<h3 class="watch-name">'+w.name+'</h3>'
            +'<a href="watch.html?id='+w.id+'" class="watch-price">'+(w.price||'Price on request')+'</a>'
            +'</div></div>';
        });
        html += '</div>';
      }
      html += '</section>';
    });

    container.innerHTML = html;
    // If a specific decade is requested, hide the others
    var params = new URLSearchParams(window.location.search);
    var target = params.get('d') || window.location.hash.replace('#','');
    if(target){
      var sections = document.querySelectorAll('.decade-section');
      sections.forEach(function(s){
        if(s.id !== target) s.style.display = 'none';
      });
    }
    window.scrollTo(0,0);
  });
</script>

</body>
</html>
